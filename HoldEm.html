        simulateHandOnTable(tid) {
          const ids = this.tables[tid] || [];
          const seated = ids .map(id => this.entrants.find(e => e.id === id)) .filter(e => e && !e.busted);
          if (seated.length < 2) return;
          const bb = BIG_BLIND;
          const busted = [];
          const short = seated.some(e => e.stack <= 10 * bb);
          const probAllIn = short ? 0.30 : 0.10;
          const rnd = Math.random();
          if (rnd < probAllIn) {
            const [a, b] = pickTwo(seated);
            if (!a || !b) return;
            const allInAmt = Math.min(a.stack, b.stack);
            if (allInAmt <= 0) return;
            const scoreA = this.tourneySimScore(a);
            const scoreB = this.tourneySimScore(b);
            const pA = scoreA / Math.max(0.01, scoreA + scoreB);
            const winner = Math.random() < pA ? a : b;
            const loser = winner === a ? b : a;
            winner.stack += allInAmt;
            loser.stack -= allInAmt;
            if (loser.stack <= 0) {loser.stack = 0;busted.push(loser);log(`${loser.name} busts from another table.`, 'bust');}
          } else {
            const k = Math.max(2, Math.min(5, Math.floor(Math.random() * 4) + 2));
            const participants = sampleK(seated, Math.min(k, seated.length));
            const potBB = Math.max(2,Math.round(triangular(3, Math.min(20, Math.floor(avgStackBB(seated) / 2)), 6)));
            let pot = potBB * bb;
            let total = 0;
            const each = Math.ceil(pot / participants.length);
            for (const e of participants) {const c = Math.min(each, e.stack);e.stack -= c;total += c;}
            pot = total;
            const winner = participants[Math.floor(Math.random() * participants.length)];
            winner.stack += pot;
            for (const e of participants) {if (e.stack <= 0) {e.stack = 0;busted.push(e);log(`${e.name} busts from another table.`, 'bust');}}

          const bluffing = clamp01((e.bluffing ?? 50) / 100);
          const lucky = clamp01((e.lucky ?? 50) / 100);

        rebuildVisibleForNextHand() {

            const id = old?.entrantId;
            if (!id || !targetIds.includes(id) || used.has(id)) return this.emptySeat(seat);
            const ent = this.entrants.find(e => e.id === id && !e.busted);
            if (!ent) return this.emptySeat(seat);
            used.add(id);
            return this.playerFromEntrant(ent, seat);
          });
          for (const id of targetIds) {
            if (used.has(id)) continue;
            const ent = this.entrants.find(e => e.id === id && !e.busted);
            if (!ent) continue;
            let seat = -1;
            if (id === humanId && humanAlive) {const hs = Math.max(0, Math.min(7, state.humanSeat | 0));if (state.players[hs]?.empty) seat = hs;}
            if (seat === -1) seat = state.players.findIndex(p => !p || p.empty);
            if (seat !== -1) {state.players[seat] = this.playerFromEntrant(ent, seat);used.add(id);}
          }
          Render();
        },
        
        nextHand() {
          if (!this.active) return;
          this.clearResultActions();
          this.syncEntrantsFromVisible();
          this.rebalanceTables();
          const rem = this.remaining();
          if (rem <= 8 && this.tables.length === 1 && this.visibleTableId !== 0) {
            this.visibleTableId = 0;
            log('Final Table formed. View switched to Final Table.', 'event');
          }
          this.rebuildVisibleForNextHand();
          state.showdownPot = null;
          DealHand();
        },
        
        showBustModal(place) {
          const txt = `YOU HAVE BUSTED OUT IN ${place}${this.ordinal(place)} PLACE!\nKeep watching the tournament, or exit out.`;
          ShowHandResult(txt);
          state.continuousPlay = false;
          clearTimeout(state.autoDealTimer);
          state.autoDealTimer = null;
          const modal = document.getElementById('resultModal');
          if (modal) {
            this.clearResultActions();
            modal.classList.add('bust-modal');
            const actions = document.createElement('div');
            actions.className = 'result-actions bust-actions';
            actions.innerHTML = `
              <button id="watchBtn" class="bust-action-btn watch-btn">Keep Watching</button>
              <button id="newTBtn" class="bust-action-btn newt-btn">Exit Tournament</button>
            `;
            modal.appendChild(actions);
            document.getElementById('watchBtn')?.addEventListener('click', () => {HideResult();this.clearResultActions();state.watchingTournament = true;Render();}, { once: true });
            document.getElementById('newTBtn')?.addEventListener('click', () => {location.reload();}, { once: true });
          }
        },
        
        pickSpectatorTable(oldVid) {
          const T = this.tables || [];
          if (!Array.isArray(T) || T.length === 0) return 0;
          if (oldVid >= 0 && oldVid < T.length && Array.isArray(T[oldVid]) && T[oldVid].length > 0) {return oldVid;}
          let best = 0, bestSize = -1;
          for (let i = 0; i < T.length; i++) {const size = (T[i]?.length) || 0;if (size > bestSize) { best = i; bestSize = size; }}
          return best;
        },
        
        finishTournament() {this.stop();this.winnerAnnounced = true;UpdateTopbarFromState();},
        
        showWinModal(championName = 'You') {
          const resultText = document.getElementById('resultText');
          if (!resultText?.textContent?.trim()) ShowHandResult('Tournament complete.');
          ShowChampionMessage(championName);
          const modal = document.getElementById('resultModal');
          if (modal) {
              if (typeof this.clearResultActions === 'function') this.clearResultActions();
              const actions = document.createElement('div');
              actions.className = 'result-actions';
              actions.innerHTML = `<button id="newTBtn">Exit</button>`;
              modal.appendChild(actions);
              document.getElementById('newTBtn')?.addEventListener('click', () => location.reload(), { once: true });
            }
        },
        
        ordinal(n) {const s = ['th', 'st', 'nd', 'rd'];const v = n % 100;return s[(v - 20) % 10] || s[v] || s[0];}
      };
      
      window.Tournament = Tournament;

      const startCashBtn = document.getElementById('startCashBtn');
      const startTourneyBtn = document.getElementById('startTourneyBtn');
      const blindInterval = document.getElementById('blindInterval');
      const blindLabel = document.getElementById('blindLabel');
      const remEl = document.getElementById('blindRemaining');
      const chipBtn = document.getElementById('chipCountsBtn');
      const chipOverlay = document.getElementById('chipCountsOverlay');
      const chipList = document.getElementById('chipCountsList');
      const closeChipBtn = document.getElementById('closeChipCountsBtn');
      overlay?.classList.add('hidden');
      state.mode = 'cash';
      
      SetBlinds(CASH_SMALL_BLIND, CASH_BIG_BLIND);
      
      blindLabel?.classList.add('hidden');
      blindInterval?.classList.add('hidden');
      chipBtn?.classList.add('hidden');
      document.getElementById('tourneySummary')?.classList.add('hidden');
      remEl?.classList.add('hidden');
      startCashBtn?.addEventListener('click', () => {state.mode = 'cash';overlay?.classList.remove('hidden');});
      startTourneyBtn?.addEventListener('click', () => {state.mode = 'tournament';overlay?.classList.remove('hidden');});
      chipBtn?.addEventListener('click', () => {
        const t = state.tourney || (typeof Tournament !== 'undefined' ? Tournament : null);
        if (state.mode === 'tournament' && t && Array.isArray(t.entrants) && t.entrants.length) {
          if (typeof t.openChipCounts === 'function') t.openChipCounts();
          return;
        }
        if (chipList) chipList.innerHTML = `<div style="color:var(--muted);">Start a tournament to see live chip counts.</div>`;
        chipOverlay?.classList.remove('hidden');
      });
      closeChipBtn?.addEventListener('click', () => {chipOverlay?.classList.add('hidden');});
      blindInterval?.addEventListener('change', () => {
        const t = state.tourney || (typeof Tournament !== 'undefined' ? Tournament : null);
        if (!t) return;
        const newMinutes = parseInt(blindInterval.value || '7', 10) || 7;
        t.intervalMinutes = newMinutes;
        UpdateTopbarFromState();
        if (!t.active) return;
        const remainingMs = Math.max(0, (t.nextLevelAt || Date.now()) - Date.now());
        if (typeof UpdateBlindRemainingDisplay === 'function') {UpdateBlindRemainingDisplay(remainingMs);}
      });
        
      const CPU_AUDIT = {
        enabled:true,
        maxRecords:600,
        handNo:0,
        records:[],
        startHand(){if (typeof CPU_TEST !== 'undefined' && CPU_TEST?.running) return;this.handNo = (this.handNo || 0) + 1;},
        cardText(c){return c ? `${c.rank}${c.suit}` : '';},
        cardsText(cards){return (cards || []).filter(Boolean).map(c => this.cardText(c)).join(' ');},
        phaseKey(d){return d?.phase === 'PreFlop' ? 'preflop' : 'postflop';},
        bucketKey(d){return d?.phase === 'PreFlop' ? (d.preflopClass || 'unknown') : (d.bucket || 'unknown');},
        actionKey(d, decision){
          const action = decision?.type || d?.action?.type || 'UNKNOWN';
          const open = d?.phase === 'PreFlop' ? !!d?.unopenedPreflop : !(Number(d?.toCall || 0) > 0);
          if (open && d?.phase !== 'PreFlop') {
            if (action === 'CALL') return 'check';
            if (action === 'BET') return 'bet';
            if (action === 'ALLIN') return 'allin';
            return String(action).toLowerCase();
          }
          if (d?.phase === 'PreFlop' && open) {
            if (action === 'FOLD') return 'fold';
            if (action === 'CALL') return 'call';
            if (action === 'BET') return 'raise';
            if (action === 'ALLIN') return 'allin';
            return String(action).toLowerCase();
          }
          if (action === 'FOLD') return 'fold';
          if (action === 'CALL') return 'call';
          if (action === 'BET') return 'raise';
          if (action === 'ALLIN') return 'allin';
          return String(action).toLowerCase();
        },
        reasonsFor(d, decision){
          const phase = this.phaseKey(d);
          const bucket = this.bucketKey(d);
          const key = this.actionKey(d, decision);
          const reasons = [];
          const toCall = Number(d?.toCall || 0);
          const betPot = Number(d?.betPotFrac || 0);
          const stackFrac = Number(d?.incrementalStackFrac || d?.callCommitFrac || 0);
          const bs = d?.betSizing || {};
          const sizeBB = Number(bs.pressureBB || 0);
          const sizePot = Number(bs.pressurePotFrac || 0);
          const street = d?.phase || '';

          if (phase === 'preflop') {
            if (bucket === 'trash' && (key === 'raise' || key === 'allin')) reasons.push('preflop trash aggressive action');
            if (bucket === 'speculative' && key === 'allin') reasons.push('speculative preflop all-in');
            if ((bucket === 'medium' || bucket === 'speculative') && key === 'raise' && sizeBB >= 10) reasons.push('large non-premium preflop raise');
            if ((bucket === 'strong' || bucket === 'premium') && key === 'fold') reasons.push('strong/premium preflop fold');
          } else {
            if ((bucket === 'bad' || bucket === 'weak') && (key === 'raise' || key === 'allin')) reasons.push(`${bucket} postflop aggressive action`);
            if (bucket === 'medium' && key === 'allin') reasons.push('medium postflop all-in');
            if (bucket === 'medium' && key === 'call' && (betPot >= .65 || stackFrac >= .18)) reasons.push('medium call facing large pressure');
            if ((bucket === 'strong' || bucket === 'nearnut') && key === 'fold') reasons.push(`${bucket} postflop fold`);
            if (bucket === 'nearnut' && key === 'call' && toCall > 0 && (street === 'Turn' || street === 'River')) reasons.push('nearnut passive call facing pressure');
            if ((bucket === 'strong' || bucket === 'nearnut') && (key === 'bet' || key === 'raise') && sizePot > 0 && sizePot <= .25) reasons.push(`${bucket} very small pressure sizing`);
            if ((bucket === 'bad' || bucket === 'weak') && (key === 'bet' || key === 'raise') && sizePot >= .75) reasons.push(`${bucket} large pressure sizing`);
          }
          return reasons;
        },
        note(player, debug, decision){
          if (!this.enabled) return;
          if (typeof CPU_TEST !== 'undefined' && CPU_TEST?.running) return;
          if (!player || player.human) return;
          const reasons = this.reasonsFor(debug, decision);
          if (!reasons.length) return;
          const action = this.actionKey(debug, decision);
          const bs = debug?.betSizing || {};
          const rec = {
            hand:this.handNo || 0,
            phase:debug?.phase || state.phase,
            player:player.name,
            seat:player.seat,
            bucket:this.bucketKey(debug),
            action,
            reasons:reasons.join('; '),
            hole:this.cardsText(player.hand),
            board:this.cardsText(state.community),
            pot:Math.round(Number(debug?.pot || state.pot || 0)),
            toCall:Math.round(Number(debug?.toCall || 0)),
            currentBet:Math.round(Number(state.currentBet || 0)),
            stack:Math.round(Number(player.stack || 0)),
            amount:Math.round(Number(bs.pressureAmount ?? bs.amount ?? decision?.amount ?? 0)),
            bb:Number.isFinite(bs.pressureBB) ? Math.round(bs.pressureBB * 10) / 10 : '',
            potPct:Number.isFinite(bs.pressurePotFrac) ? Math.round(bs.pressurePotFrac * 1000) / 10 : '',
            stackPct:Number.isFinite(bs.pressureStackFrac) ? Math.round(bs.pressureStackFrac * 1000) / 10 : '',
            choice:debug?.choice || '',
            probabilities:{...(debug?.probabilities || {})},
            timestamp:new Date().toLocaleTimeString()
          };
          this.records.push(rec);
          if (this.records.length > this.maxRecords) this.records.splice(0, this.records.length - this.maxRecords);
        },
        table(limit = 80){
          const n = Math.max(1, Math.floor(Number(limit) || 80));
          return this.records.slice(-n).map((r, i) => ({
            '#':this.records.length - Math.min(n, this.records.length) + i + 1,
            Hand:r.hand,Street:r.phase,Player:r.player,Bucket:r.bucket,Action:r.action,Reason:r.reasons,
            Hole:r.hole,Board:r.board,Pot:r.pot,ToCall:r.toCall,Amount:r.amount,BB:r.bb,'Pot %':r.potPct,'Stack %':r.stackPct
          }));
        },
        print(limit = 80){
          console.log(`CPU decision audit log: ${this.records.length} suspicious records captured; showing last ${Math.min(Math.max(1, Math.floor(Number(limit) || 80)), this.records.length)}.`);
          console.table(this.table(limit));
          return this.records.slice();
        },
        summary(){
          const counts = {};
          for (const r of this.records) {const key = `${r.phase}:${r.bucket}:${r.action}`;counts[key] = (counts[key] || 0) + 1;}
          const rows = Object.entries(counts).map(([Key,n]) => ({Key,n})).sort((a,b) => b.n - a.n);
          console.table(rows);
          return rows;
        },
        clear(){this.records.length = 0;console.log('CPU decision audit log cleared.');}
      };
      window.CPU_AUDIT = CPU_AUDIT;
      window.PrintCpuAuditLog = function(limit = 80){return CPU_AUDIT.print(limit);};
      window.CpuAuditLog = function(){return CPU_AUDIT.records.slice();};
      window.PrintCpuAuditSummary = function(){return CPU_AUDIT.summary();};
      window.ClearCpuAuditLog = function(){return CPU_AUDIT.clear();};
      const CPU_TEST = {
        running:false,hands:0,buckets:{},actions:{},phaseActions:{},sizing:{},
        preflopBuckets:['trash','speculative','medium','strong','premium'],
        postflopBuckets:['bad','weak','medium','nice','strong','nearnut'],
        reset(){this.hands=0;this.buckets={};this.actions={};this.phaseActions={};this.sizing={};},
        pct(n, d){return d > 0 ? Math.round((n || 0) * 1000 / d) / 10 : 0;},
        bucketLabel(bucket){return String(bucket || 'unknown').replace(/(^|\s)\S/g, c => c.toUpperCase()).replace('Nearnut','NearNut');},
        phaseKey(d){return d?.phase === 'PreFlop' ? 'preflop' : 'postflop';},
        bucketKey(d){return d?.phase === 'PreFlop' ? (d.preflopClass || 'unknown') : (d.bucket || 'unknown');},
        spotKey(d){
          // For preflop diagnostics, "open" means no voluntary raise has occurred. The player may still be facing posted big blind.
          // For reporting, treat BB checks as calls so preflop open columns stay fold/call/raise/allin.
          if (d?.phase === 'PreFlop') return d?.unopenedPreflop ? 'open' : 'facing';
          return (d?.toCall || 0) > 0 ? 'facing' : 'open';
        },
        actionKey(d, decision){
          const action = decision?.type || 'UNKNOWN';
          const spot = this.spotKey(d);
          const phase = this.phaseKey(d);
          if (spot === 'open' && phase === 'preflop') {
            if (action === 'FOLD') return 'fold';
            if (action === 'CALL') return 'call';
            if (action === 'BET') return 'raise';
            if (action === 'ALLIN') return 'allin';
            return 'unknown';
          }
          if (spot === 'open') {
            if (action === 'CALL') return 'check';
            if (action === 'BET') return 'bet';
            if (action === 'ALLIN') return 'allin';
            if (action === 'FOLD') return 'fold';
            return 'unknown';
          }
          if (action === 'FOLD') return 'fold';
          if (action === 'CALL') return 'call';
          if (action === 'BET') return 'raise';
          if (action === 'ALLIN') return 'allin';
          return 'unknown';
        },
        ensureActionSlot(phase, bucket, spot){
          const root = this.phaseActions[phase] ||= {};
          const byBucket = root[bucket] ||= {};
          return byBucket[spot] ||= {total:0,fold:0,check:0,call:0,bet:0,raise:0,allin:0,unknown:0};
        },
        ensureSizingSlot(phase, bucket, action){
          const root = this.sizing[phase] ||= {};
          const byBucket = root[bucket] ||= {};
          return byBucket[action] ||= {n:0,bb:0,potFrac:0,stackFrac:0};
        },
        note(player, decision){
          const d = player?.cpuPieDebug || player?.lastDecisionDebug || {};
          const phase = this.phaseKey(d);
          const bucket = this.bucketKey(d);
          const spot = this.spotKey(d);
          const key = this.actionKey(d, decision);
          const action = decision?.type || 'UNKNOWN';

          const b = this.buckets[bucket] ||= {hands:0,fold:0,call:0,check:0,bet:0,raise:0,allin:0};
          b.hands++;
          b[key] = (b[key] || 0) + 1;
          this.actions[action] = (this.actions[action] || 0) + 1;

          const slot = this.ensureActionSlot(phase, bucket, spot);
          slot.total++;
          slot[key] = (slot[key] || 0) + 1;

          if (key === 'bet' || key === 'raise') {
            const bs = d.betSizing || {};
            const bb = Number.isFinite(bs.pressureBB) ? bs.pressureBB : (Number(bs.pressureAmount ?? bs.amount ?? 0) / Math.max(1, BIG_BLIND || 1));
            const potFrac = Number.isFinite(bs.pressurePotFrac) ? bs.pressurePotFrac : (Number(bs.pressureAmount ?? bs.amount ?? 0) / Math.max(1, bs.potAfterCall || d.pot || 1));
            const stackFrac = Number.isFinite(bs.pressureStackFrac) ? bs.pressureStackFrac : (Number(bs.pressureAmount ?? bs.amount ?? 0) / Math.max(1, player?.stack || STARTING_STACK || 1));
            const ss = this.ensureSizingSlot(phase, bucket, key);
            ss.n++;
            ss.bb += bb;
            ss.potFrac += potFrac;
            ss.stackFrac += stackFrac;
          }
        },
        fmtPreflopOpen(slot){
          // Preflop open means no voluntary raise yet; BB checks are reported as calls.
          const t = Math.max(0, (slot?.fold || 0) + (slot?.call || 0) + (slot?.raise || 0) + (slot?.allin || 0));
          return `${this.pct(slot?.fold, t)}/${this.pct(slot?.call, t)}/${this.pct(slot?.raise, t)}/${this.pct(slot?.allin, t)}`;
        },
        fmtPostflopOpen(slot){
          const t = Math.max(0, (slot?.check || 0) + (slot?.bet || 0) + (slot?.allin || 0));
          return `${this.pct(slot?.check, t)}/${this.pct(slot?.bet, t)}/${this.pct(slot?.allin, t)}`;
        },
        fmtOpen(slot, phase){return phase === 'preflop' ? this.fmtPreflopOpen(slot) : this.fmtPostflopOpen(slot);},
        fmtFacing(slot){
          const t = Math.max(0, (slot?.fold || 0) + (slot?.call || 0) + (slot?.raise || 0) + (slot?.allin || 0));
          return `${this.pct(slot?.fold, t)}/${this.pct(slot?.call, t)}/${this.pct(slot?.raise, t)}/${this.pct(slot?.allin, t)}`;
        },
        actionTable(phase){
          const order = phase === 'preflop' ? this.preflopBuckets : this.postflopBuckets;
          const data = this.phaseActions[phase] || {};
          return order.map(bucket => {
            const open = data[bucket]?.open || {total:0};
            const facing = data[bucket]?.facing || {total:0};
            return {Bucket:this.bucketLabel(bucket),Open:this.fmtOpen(open, phase),'Open n':open.total || 0,Facing:this.fmtFacing(facing),'Facing n':facing.total || 0};
          });
        },
        amountTable(phase){
          const order = phase === 'preflop' ? this.preflopBuckets : this.postflopBuckets;
          const data = this.sizing[phase] || {};
          const rows = [];
          for (const bucket of order) {
            for (const action of ['bet','raise']) {
              const s = data[bucket]?.[action] || {n:0,bb:0,potFrac:0,stackFrac:0};
              if (!s.n) continue;
              rows.push({Bucket:this.bucketLabel(bucket),Action:action === 'bet' ? 'Bet' : 'Raise',n:s.n,BB:Math.round((s.bb / s.n) * 10) / 10,'Pot %':Math.round((s.potFrac / s.n) * 1000) / 10,'Stack %':Math.round((s.stackFrac / s.n) * 1000) / 10});
            }
          }
          return rows;
        },
        printTables(label = ''){
          if (label) console.log(label);
          console.log(`Hands: ${this.hands}`);
          console.log('Preflop action percentages by bucket (Open: fold/call/raise/allin) (Facing: fold/call/raise/allin)');
          console.table(this.actionTable('preflop'));
          console.log('Postflop action percentages by bucket (Open: check/bet/allin) (Facing: fold/call/raise/allin)');
          console.table(this.actionTable('postflop'));
          console.log('Preflop betting/raising amounts');
          console.table(this.amountTable('preflop'));
          console.log('Postflop betting/raising amounts');
          console.table(this.amountTable('postflop'));
        },
        summary(){
          const out = {hands:this.hands,actions:{...this.actions},preflopActionTable:this.actionTable('preflop'),postflopActionTable:this.actionTable('postflop'),preflopAmountTable:this.amountTable('preflop'),postflopAmountTable:this.amountTable('postflop'),pieBucketDiagnostics:{}};
          Object.entries(this.buckets).forEach(([bucket,b]) => {
            const h = Math.max(1,b.hands || 0);
            out.pieBucketDiagnostics[bucket] = {...b,foldRate:b.fold/h,callRate:b.call/h,checkRate:b.check/h,betRate:b.bet/h,raiseRate:b.raise/h,allinRate:b.allin/h};
          });
          return out;
        }
      };
      
    </script>
  </body>
