<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Play Some Poker!</title>

  <style>
    :root {
      --gold-light: #fff1b8;
      --gold: #d8aa32;
      --gold-dark: #7a4f08;
      --felt-bright: #0d5a31;
      --felt: #07371f;
      --felt-dark: #03170d;
      --panel: rgba(0, 0, 0, 0.48);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Georgia, "Times New Roman", serif;
      color: white;
      background:
        radial-gradient(circle at 50% 18%, rgba(34, 140, 72, 0.38), transparent 35%),
        radial-gradient(circle at 15% 85%, rgba(160, 25, 25, 0.16), transparent 28%),
        radial-gradient(circle at 85% 85%, rgba(212, 170, 50, 0.14), transparent 26%),
        repeating-linear-gradient(
          45deg,
          rgba(255,255,255,0.025) 0px,
          rgba(255,255,255,0.025) 2px,
          transparent 2px,
          transparent 18px
        ),
        linear-gradient(180deg, var(--felt-bright), var(--felt), var(--felt-dark));
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at center, transparent 0%, transparent 58%, rgba(0,0,0,0.55) 100%),
        repeating-radial-gradient(
          circle at center,
          rgba(255, 215, 115, 0.055) 0px,
          rgba(255, 215, 115, 0.055) 1px,
          transparent 1px,
          transparent 16px
        );
      opacity: 0.85;
    }

    .page {
      position: relative;
      z-index: 1;
      width: min(1480px, calc(100% - 24px));
      margin: 22px auto;
      padding: 26px 28px 34px;
      border-radius: 30px;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.06), transparent 28%),
        rgba(0, 0, 0, 0.34);
      border: 2px solid rgba(255, 221, 128, 0.36);
      box-shadow:
        0 24px 60px rgba(0,0,0,0.58),
        inset 0 0 60px rgba(0,0,0,0.45),
        inset 0 0 0 1px rgba(255,255,255,0.06);
      backdrop-filter: blur(4px);
    }

    .title {
      margin: 8px 0 6px;
      text-align: center;
      text-transform: uppercase;
      font-size: clamp(2.2rem, 4.4vw, 4.15rem);
      white-space: nowrap;
      line-height: 1;
      letter-spacing: 2px;
      color: var(--gold-light);
      text-shadow:
        0 1px 0 #fff8d8,
        0 2px 0 #f0d884,
        0 3px 0 #d0a43c,
        0 4px 0 #a97016,
        0 5px 0 #6d4208,
        0 8px 18px rgba(0,0,0,0.7),
        0 0 24px rgba(255, 215, 110, 0.38);
      animation: titleGlow 3.2s ease-in-out infinite;
    }

    @keyframes titleGlow {
      0%, 100% {
        filter: brightness(1);
      }

      50% {
        filter: brightness(1.16);
      }
    }

    .subtitle {
      text-align: center;
      margin: 0 0 26px;
      color: #f3deb0;
      font-size: 1.08rem;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      text-shadow: 0 2px 8px rgba(0,0,0,0.8);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(220px, 1fr));
      gap: 22px;
    }

    .game-link {
      display: block;
      text-decoration: none;
      color: inherit;
      perspective: 1000px;
    }

    .game-card {
      position: relative;
      overflow: hidden;
      border-radius: 22px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.08), rgba(0,0,0,0.28)),
        rgba(0,0,0,0.42);
      border: 2px solid rgba(255, 218, 128, 0.35);
      box-shadow:
        0 12px 24px rgba(0,0,0,0.45),
        inset 0 0 0 1px rgba(255,255,255,0.06),
        inset 0 -18px 40px rgba(0,0,0,0.28);
      transform: translateY(0) rotateX(0);
      transition:
        transform 0.22s ease,
        border-color 0.22s ease,
        box-shadow 0.22s ease,
        filter 0.22s ease;
    }

    .game-card::before {
      content: "";
      position: absolute;
      top: -40%;
      left: -80%;
      width: 70%;
      height: 180%;
      transform: rotate(28deg);
      background: linear-gradient(
        90deg,
        transparent,
        rgba(255, 240, 180, 0.22),
        transparent
      );
      opacity: 0;
      transition: left 0.55s ease, opacity 0.25s ease;
      z-index: 2;
      pointer-events: none;
    }

    .game-link:hover .game-card,
    .game-link:focus .game-card {
      transform: translateY(-8px) rotateX(3deg);
      border-color: rgba(255, 234, 160, 0.88);
      filter: brightness(1.08);
      box-shadow:
        0 22px 38px rgba(0,0,0,0.58),
        0 0 22px rgba(255, 211, 96, 0.28),
        inset 0 0 0 1px rgba(255,255,255,0.12),
        inset 0 -18px 40px rgba(0,0,0,0.24);
    }

    .game-link:hover .game-card::before,
    .game-link:focus .game-card::before {
      left: 120%;
      opacity: 1;
    }

    .image-frame {
      padding: 10px;
      background:
        radial-gradient(circle at center, rgba(255,221,128,0.09), transparent 58%),
        linear-gradient(180deg, rgba(255,255,255,0.05), rgba(0,0,0,0.22));
    }

    .game-image {
      display: block;
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow:
        0 8px 18px rgba(0,0,0,0.42),
        inset 0 0 18px rgba(0,0,0,0.35);
      background: #052915;
    }

    @media (max-width: 980px) {
      .grid {
        grid-template-columns: repeat(2, minmax(220px, 1fr));
      }
    }

    @media (max-width: 640px) {
      .page {
        width: min(100% - 22px, 1280px);
        margin: 12px auto;
        padding: 20px 16px 28px;
      }

      .grid {
        grid-template-columns: 1fr;
        gap: 20px;
      }

      .subtitle {
        margin-bottom: 22px;
        font-size: 0.95rem;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <h1 class="title">Play Some Poker!</h1>
    <p class="subtitle">Choose your Game</p>

    <section class="grid" aria-label="Poker game selection">

      <a class="game-link" href="HoldEm.html">
        <article class="game-card">
          <div class="image-frame">
            <img class="game-image" src="HoldEm.png" alt="HoldEm" />
          </div>
        </article>
      </a>

      <a class="game-link" href="LowChicago.html">
        <article class="game-card">
          <div class="image-frame">
            <img class="game-image" src="LowChicago.png" alt="LowChicago" />
          </div>
        </article>
      </a>

      <a class="game-link" href="CrazyFive.html">
        <article class="game-card">
          <div class="image-frame">
            <img class="game-image" src="CrazyFive.png" alt="Crazy Five" />
          </div>
        </article>
      </a>

      <a class="game-link" href="MonsterGuts.html">
        <article class="game-card">
          <div class="image-frame">
            <img class="game-image" src="MonsterGuts.png" alt="Monster Guts" />
          </div>
        </article>
      </a>

      <a class="game-link" href="PasstheTrash.html">
        <article class="game-card">
          <div class="image-frame">
            <img class="game-image" src="PasstheTrash.png" alt="PasstheTrash" />
          </div>
        </article>
      </a>

      <a class="game-link" href="SevenTwentySeven.html">
        <article class="game-card">
          <div class="image-frame">
            <img class="game-image" src="SevenTwentySeven.png" alt="SevenTwentySeven" />
          </div>
        </article>
      </a>

    </section>
  </main>
</body>
</html>
